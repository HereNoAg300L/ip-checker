name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.9.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check syntax
        run: pnpm run check

      - name: Run tests
        run: pnpm test

      - name: Validate Worker bundle
        run: pnpm exec wrangler deploy --dry-run --outdir dist
